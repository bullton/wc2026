<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 世界杯 - 赛程日历</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jquery-bracket@0.11.1/dist/jquery.bracket.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-bracket@0.11.1/dist/jquery.bracket.min.js"></script>
    <style>
        :root {
            --bg-dark: #0a0f1a;
            --bg-card: #111827;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent: #10b981;
            --group-a: #ef4444;
            --group-b: #f59e0b;
            --group-c: #10b981;
            --group-d: #06b6d4;
            --group-e: #8b5cf6;
            --group-f: #ec4899;
            --group-g: #3b82f6;
            --group-h: #f97316;
            --group-i: #14b8a6;
            --group-j: #a855f7;
            --group-k: #22c55e;
            --group-l: #f43f5e;
            --knockout: #fbbf24;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .hero {
            position: relative;
            padding: 60px 20px 40px;
            text-align: center;
            background: linear-gradient(180deg, #0f172a 0%, var(--bg-dark) 100%);
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100%;
            background: radial-gradient(ellipse at 50% 0%, rgba(16, 185, 129, 0.15) 0%, transparent 60%);
            pointer-events: none;
        }
        
        .hero h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 0%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hero p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        
        .reset-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ef4444;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
            transition: all 0.3s;
            z-index: 100;
        }
        
        .reset-btn:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(239, 68, 68, 0.5);
        }
        
        .reset-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .fill-btn-container {
            position: fixed;
            bottom: 70px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
        }

        .fill-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
            transition: all 0.3s;
            min-width: 100px;
        }

        .fill-btn:hover {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.5);
        }

        .fill-btn:disabled {
            background: #6b7280;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .fill-btn.r2 { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        .fill-btn.r2:hover { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); }

        .fill-btn.r3 { background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4); }
        .fill-btn.r3:hover { background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); }

        .fill-btn.all { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4); }
        .fill-btn.all:hover { background: linear-gradient(135deg, #d97706 0%, #b45309 100%); }
        
        .timezone-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            color: var(--accent);
        }
        
        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 0 20px;
            margin-bottom: 20px;
        }
        
        .tab-btn {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-secondary);
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.3s ease;
        }
        
        .tab-btn:hover {
            color: var(--text-primary);
            border-color: var(--accent);
        }
        
        .tab-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        
        .tab-content {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }
        
        #tab-brackets {
            max-width: 100%;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            padding: 5px 10px;
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .calendar-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .month-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            min-width: 200px;
            text-align: center;
        }
        
        .nav-btn {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .nav-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }
        
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .calendar {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }
        
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .weekday {
            text-align: center;
            padding: 15px;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }
        
        .day-cell {
            background: var(--bg-card);
            border-radius: 12px;
            min-height: 280px;
            height: auto;
            padding: 12px;
        }
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .day-cell:hover {
            border-color: rgba(16, 185, 129, 0.3);
            transform: translateY(-2px);
        }
        
        .day-cell.empty {
            background: transparent;
            border: none;
        }
        
        .day-number {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .day-cell.today .day-number {
            color: var(--accent);
        }
        
        .day-cell.has-matches {
            background: linear-gradient(135deg, rgba(17, 24, 39, 0.9) 0%, rgba(17, 24, 39, 0.7) 100%);
        }
        
        .match-item {
            padding: 5px 7px;
            margin-bottom: 3px;
            border-radius: 6px;
            font-size: 0.72rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }
        
        .match-item:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }
        
        .match-time {
            font-weight: 600;
            opacity: 0.9;
            font-size: 0.65rem;
        }
        
        .match-teams {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .score-display {
            font-weight: 700;
            color: #10b981;
            margin: 0 6px;
        }
        
        .vs-text {
            color: #888;
            margin: 0 6px;
        }
        
        .match-venue {
            font-size: 0.65rem;
            opacity: 0.8;
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        
        .fi {
            font-size: 0.8rem;
        }
        
        .group-A { background: rgba(239, 68, 68, 0.2); border-left: 3px solid var(--group-a); }
        .group-B { background: rgba(245, 158, 11, 0.2); border-left: 3px solid var(--group-b); }
        .group-C { background: rgba(16, 185, 129, 0.2); border-left: 3px solid var(--group-c); }
        .group-D { background: rgba(6, 182, 212, 0.2); border-left: 3px solid var(--group-d); }
        .group-E { background: rgba(139, 92, 246, 0.2); border-left: 3px solid var(--group-e); }
        .group-F { background: rgba(236, 72, 153, 0.2); border-left: 3px solid var(--group-f); }
        .group-G { background: rgba(59, 130, 246, 0.2); border-left: 3px solid var(--group-g); }
        .group-H { background: rgba(249, 115, 22, 0.2); border-left: 3px solid var(--group-h); }
        .group-I { background: rgba(20, 184, 166, 0.2); border-left: 3px solid var(--group-i); }
        .group-J { background: rgba(168, 85, 247, 0.2); border-left: 3px solid var(--group-j); }
        .group-K { background: rgba(34, 197, 94, 0.2); border-left: 3px solid var(--group-k); }
        .group-L { background: rgba(244, 63, 94, 0.2); border-left: 3px solid var(--group-l); }
        .group-knockout { background: rgba(251, 191, 36, 0.2); border-left: 3px solid var(--knockout); }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
            transform: scale(0.9);
            transition: all 0.3s ease;
        }
        
        .modal-overlay.active .modal {
            transform: scale(1);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }
        
        .modal-close:hover {
            color: var(--text-primary);
        }
        
        .modal-body {
            color: var(--text-secondary);
            line-height: 1.8;
        }
        
        .modal-body p {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .modal-body strong {
            color: var(--text-primary);
        }
        
        .modal-teams {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            font-size: 1.5rem;
            font-weight: 700;
            margin: 20px 0;
        }
        
        .vs {
            color: var(--accent);
            font-size: 1.2rem;
        }
        
        .edit-form {
            margin: 15px 0;
        }
        
        .edit-teams-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
        }
        
        .edit-team-box {
            text-align: center;
            min-width: 120px;
        }
        
        .edit-team-name {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-primary);
        }
        
        .edit-score-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .edit-score-input {
            width: 60px;
            height: 60px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s;
        }
        
        .edit-score-input:focus {
            border-color: var(--accent);
            background: rgba(16, 185, 129, 0.1);
        }
        
        .edit-score-input::-webkit-inner-spin-button,
        .edit-score-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        .edit-score-input[type=number] {
            -moz-appearance: textfield;
        }
        
        .edit-cards-group {
            margin-top: 20px;
        }
        
        .edit-card-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 10px 0;
            padding: 8px 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }
        
        .edit-card-label {
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .yellow-icon {
            width: 16px;
            height: 16px;
            background: #eab308;
            border-radius: 3px;
        }
        
        .red-icon {
            width: 16px;
            height: 16px;
            background: #ef4444;
            border-radius: 3px;
        }
        
        .edit-card-input {
            width: 50px;
            height: 36px;
            text-align: center;
            font-size: 1rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: var(--text-primary);
            outline: none;
        }
        
        .edit-card-input:focus {
            border-color: var(--accent);
        }
        
        .edit-card-input::-webkit-inner-spin-button,
        .edit-card-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        .edit-card-input[type=number] {
            -moz-appearance: textfield;
        }
        
        .edit-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
        }
        
        .edit-btn {
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-family: 'Noto Sans SC', sans-serif;
        }
        
        .edit-btn-cancel {
            background: rgba(255,255,255,0.1);
            color: var(--text-secondary);
        }
        
        .edit-btn-cancel:hover {
            background: rgba(255,255,255,0.15);
            color: var(--text-primary);
        }
        
        .edit-btn-save {
            background: var(--accent);
            color: white;
        }
        
        .edit-btn-save:hover {
            background: #0d9668;
            transform: translateY(-2px);
        }
        
        .edit-btn-save:disabled {
            background: rgba(16, 185, 129, 0.3);
            cursor: not-allowed;
            transform: none;
        }

        .ai-predict-section {
            text-align: center;
            margin: 15px 0;
            padding: 10px;
        }

        .ai-predict-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .ai-predict-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .ai-predict-btn:disabled {
            background: #888;
            cursor: not-allowed;
            transform: none;
        }

        .ai-result {
            background: rgba(102, 126, 234, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-top: 10px;
            text-align: left;
        }

        .ai-prediction-header {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
        }

        .ai-prediction-score {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .ai-prediction-reason {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .edit-match-info {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .edit-match-info span {
            margin: 0 10px;
        }
        
        .edit-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: 600;
            z-index: 2000;
            transition: transform 0.3s ease;
        }
        
        .edit-toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .edit-toast.error {
            background: #ef4444;
        }
        
        .standings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }
        
        .standings-table {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .standings-header {
            padding: 12px 15px;
            font-weight: 700;
            font-size: 1.1rem;
            background: rgba(255,255,255,0.05);
        }
        
        .standings-table table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        
        .standings-table th, .standings-table td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .standings-table th {
            background: rgba(255,255,255,0.03);
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .standings-table .team-name {
            text-align: left;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .flag-icon {
            display: inline-block !important;
            width: 20px !important;
            height: 14px !important;
            background-size: cover !important;
        }
        
        .standings-table .points {
            font-weight: 700;
            color: var(--accent);
        }
        
        .standings-table .positive {
            color: #22c55e;
        }
        
        .standings-table .negative {
            color: #ef4444;
        }
        
        .fair-play-badge {
            margin-left: 5px;
            font-size: 0.75rem;
        }
        
        .status-badge {
            margin-left: 6px;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .status-badge.locked {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        
        .status-badge.second {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }
        
        .status-badge.eliminated {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            margin-left: 4px;
        }
        
        tr.eliminated {
            opacity: 0.5;
        }
        
tr.qualified-locked {
            background: rgba(16, 185, 129, 0.15);
        }
        
        .standings-table .stat-col {
            min-width: 30px;
        }
        
        .standings-table .rank-col {
            min-width: 25px;
            font-weight: 600;
        }
        
        .standings-table .team-col {
            min-width: 80px;
        }

</head>
<body>
    <div class="hero">
        <h1>FIFA WORLD CUP 2026</h1>
        <p>美加墨世界杯 · 赛程日历</p>
        <div class="timezone-badge">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 6v6l4 2"/>
            </svg>
            <span>所有时间均为北京时间 (UTC+8)</span>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" data-tab="calendar">赛程日历</button>
        <button class="tab-btn" data-tab="standings">小组积分表</button>
        <button class="tab-btn" data-tab="brackets">淘汰赛对阵图</button>
        <button class="tab-btn" data-tab="predictions">预测记录</button>
    </div>
    
    <div id="tab-calendar" class="tab-content active">
        <div class="calendar-nav">
            <button class="nav-btn" id="prevMonth">◀ 上月</button>
            <h2 class="month-title" id="monthTitle"></h2>
            <button class="nav-btn" id="nextMonth">下月 ▶</button>
        </div>
        <div class="calendar">
            <div class="weekdays">
                <div class="weekday">周日</div>
                <div class="weekday">周一</div>
                <div class="weekday">周二</div>
                <div class="weekday">周三</div>
                <div class="weekday">周四</div>
                <div class="weekday">周五</div>
                <div class="weekday">周六</div>
            </div>
            <div class="days-grid" id="daysGrid"></div>
        </div>
        <div class="legend" id="legend"></div>
    </div>

    <div id="tab-standings" class="tab-content">
        <div class="standings-container" id="standingsContainer"></div>
    </div>
    
    <div id="tab-brackets" class="tab-content">
        <div class="brackets-container" id="bracketsContainer"></div>
    </div>
    
    <div id="tab-predictions" class="tab-content">
        <div class="predictions-list" id="predictionsList"></div>
    </div>
    
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">比赛详情</span>
                <button class="modal-close" id="modalClose">×</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>
    
    <script>
        const API_BASE = '/api';
        
        const groupColors = {
            'A': '#ef4444', 'B': '#f59e0b', 'C': '#10b981', 'D': '#06b6d4',
            'E': '#8b5cf6', 'F': '#ec4899', 'G': '#3b82f6', 'H': '#f97316',
            'I': '#14b8a6', 'J': '#a855f7', 'K': '#22c55e', 'L': '#f43f5e'
        };
        
        const venueCountries = {
            '墨西哥城球场': 'mx', '瓜达拉哈拉球场': 'mx', '蒙特雷球场': 'mx',
            '多伦多体育场': 'ca', '温哥华体育场': 'ca',
            '旧金山湾区体育场': 'us', '洛杉矶体育场': 'us', '纽约新泽西体育场': 'us',
            '波士顿体育场': 'us', '费城体育场': 'us', '休斯敦体育场': 'us',
            '达拉斯体育场': 'us', '西雅图体育场': 'us', '迈阿密体育场': 'us',
            '亚特兰大体育场': 'us', '堪萨斯城体育场': 'us'
        };
        
        let currentYear = 2026;
        let currentMonth = 6;
        let allMatches = [];
        let matchData = {};
        let allStandings = {};
        let determinedTeams = new Set();

        function getTeamBaseName(teamName) {
            if (!teamName) return '';
            const match = teamName.match(/^([^(]+)/);
            return match ? match[1].trim() : teamName;
        }

        function isTeamDetermined(teamName) {
            if (!teamName) return false;
            if (determinedTeams.has(teamName)) return true;
            const baseName = getTeamBaseName(teamName);
            for (const t of determinedTeams) {
                if (getTeamBaseName(t) === baseName) return true;
            }
            return false;
        }

        function getDeterminedTeams() {
            const set = new Set();
            if (allStandings) {
                const groups = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'];
                for (const g of groups) {
                    if (!allStandings[g]) continue;
                    for (let i = 0; i < allStandings[g].length; i++) {
                        const s = allStandings[g][i];
                        if (s.is_ranking_locked) {
                            const pos = i + 1;
                            set.add(s.team + `(${g}${pos})`);
                        }
                    }
                }
            }
            return set;
        }
        
        const R16_PLACEHOLDERS = {
            73: { home: 'A2', away: 'B2' },
            74: { home: 'C1', away: 'F2' },
            75: { home: 'E1', away: 'A/B/C/D/F3' },
            76: { home: 'F1', away: 'C2' },
            77: { home: 'E2', away: 'I2' },
            78: { home: 'I1', away: 'C/D/F/G/H3' },
            79: { home: 'A1', away: 'C/E/F/H/I3' },
            80: { home: 'L1', away: 'E/H/I/J/K3' },
            81: { home: 'G1', away: 'A/E/H/I/J3' },
            82: { home: 'D1', away: 'B/E/F/I/J3' },
            83: { home: 'H1', away: 'J2' },
            84: { home: 'K2', away: 'L2' },
            85: { home: 'B1', away: 'E/F/G/I/J3' },
            86: { home: 'D2', away: 'G2' },
            87: { home: 'J1', away: 'H2' },
            88: { home: 'K1', away: 'D/E/I/J/L3' }
        };
        
        function getR16Placeholder(matchId, slot) {
            const p = R16_PLACEHOLDERS[matchId];
            if (!p) return '待定';
            return p[slot];
        }
        
        async function fetchStandings() {
            const res = await fetch(`${API_BASE}/standings`);
            allStandings = await res.json();
            return allStandings;
        }
        
        async function fetchMatches() {
            try {
                const response = await fetch(`${API_BASE}/matches?year=${currentYear}`);
                allMatches = await response.json();
                matchData = {};
                allMatches.forEach(m => {
                    if (m.id !== undefined && m.id !== null) {
                        matchData[String(m.id)] = m;
                    }
                });
            } catch (error) {
                console.error('获取比赛数据失败:', error);
                allMatches = [];
                matchData = {};
            }
        }
        
        function getVenueFlag(venue) {
            const countryCode = venueCountries[venue];
            return countryCode ? `<span class="fi fi-${countryCode}"></span>` : '';
        }
        
        function getGroupClass(groupName) {
            if (!groupName) return 'group-knockout';
            const group = groupName.charAt(0);
            if (groupColors[group]) {
                return `group-${group}`;
            }
            return 'group-knockout';
        }
        
        function renderLegend() {
            const legend = document.getElementById('legend');
            legend.innerHTML = '';
            
            const groups = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'];
            groups.forEach(group => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `
                    <span class="legend-dot" style="background: ${groupColors[group]}"></span>
                    <span>第${group}组</span>
                `;
                legend.appendChild(item);
            });
            
            const knockout = document.createElement('div');
            knockout.className = 'legend-item';
            knockout.innerHTML = `
                <span class="legend-dot" style="background: #fbbf24"></span>
                <span>淘汰赛</span>
            `;
            legend.appendChild(knockout);
        }
        
        function getMatchesForDate(date) {
            return allMatches.filter(match => match.match_date === date);
        }
        
        function renderCalendar() {
            determinedTeams = getDeterminedTeams();
            const grid = document.getElementById('daysGrid');
            const title = document.getElementById('monthTitle');
            const prevBtn = document.getElementById('prevMonth');
            const nextBtn = document.getElementById('nextMonth');
            
            const months = ['一月', '二月', '三月', '四月', '五月', '六月', 
                           '七月', '八月', '九月', '十月', '十一月', '十二月'];
            title.textContent = `${currentYear}年 ${months[currentMonth - 1]}`;
            
            prevBtn.disabled = currentMonth <= 6;
            nextBtn.disabled = currentMonth >= 7;
            
            grid.innerHTML = '';
            
            const firstDay = new Date(currentYear, currentMonth - 1, 1);
            const lastDay = new Date(currentYear, currentMonth, 0);
            const startDayOfWeek = firstDay.getDay();
            const totalDays = lastDay.getDate();
            
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            
            for (let i = 0; i < startDayOfWeek; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'day-cell empty';
                grid.appendChild(emptyCell);
            }
            
            for (let day = 1; day <= totalDays; day++) {
                const dateStr = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayCell = document.createElement('div');
                dayCell.className = 'day-cell';
                
                if (dateStr === todayStr) {
                    dayCell.classList.add('today');
                }
                
                const matches = getMatchesForDate(dateStr);
                if (matches.length > 0) {
                    dayCell.classList.add('has-matches');
                }
                
                dayCell.innerHTML = `<div class="day-number">${day}</div>`;
                
matches.forEach(match => {
                    const matchItem = document.createElement('div');
                    matchItem.className = `match-item ${getGroupClass(match.group_name)}`;
                    const isR16 = R16_PLACEHOLDERS[match.id];
                    let homeName = match.home_team || '待定';
                    let awayName = match.away_team || '待定';
                    if (isR16) {
                        if (!isTeamDetermined(match.home_team)) {
                            homeName = getR16Placeholder(match.id, 'home');
                        }
                        if (!isTeamDetermined(match.away_team)) {
                            awayName = getR16Placeholder(match.id, 'away');
                        }
                    }
                    const isKnockout = !match.group_name || match.group_name === '';
                    const hasPenalty = isKnockout && match.home_penalty_score !== null && match.away_penalty_score !== null;
                    const penaltyStr = hasPenalty ? ` <span style="color: var(--accent); font-size: 0.85em;">(${match.home_penalty_score}-${match.away_penalty_score})</span>` : '';
                    const scoreStr = (match.home_score !== '' && match.away_score !== '') 
                            ? `<span class="score-display">${match.home_score} : ${match.away_score}${penaltyStr}</span>` 
                            : '<span class="vs-text">vs</span>';
                    matchItem.innerHTML = `
                        <div class="match-time">${match.match_time}</div>
                        <div class="match-teams">${homeName} ${scoreStr} ${awayName}</div>
                        <div class="match-venue">${getVenueFlag(match.venue)}${match.venue}</div>
                    `;
                    matchItem.addEventListener('click', () => showEditForm(match));
                    dayCell.appendChild(matchItem);
                });

                grid.appendChild(dayCell);
            }
        }
        
        function showMatchDetail(match) {
            const modal = document.getElementById('modal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            
            title.textContent = match.stage;
            body.innerHTML = `
                <div class="modal-teams">
                    <span>${match.home_team}</span>
                    <span class="vs">VS</span>
                    <span>${match.away_team}</span>
                </div>
                <p><strong>📅 日期：</strong>${match.match_date}</p>
                <p><strong>⏰ 时间：</strong>${match.match_time} (北京时间)</p>
                <p><strong>🏟️ 场馆：</strong>${getVenueFlag(match.venue)} ${match.venue}</p>
                <p><strong>📊 阶段：</strong>${match.stage}</p>
                ${match.group_name && !match.stage.includes('决赛') && !match.stage.includes('1/') ? `<p><strong>🔵 分组：</strong>第${match.group_name}组</p>` : ''}
            `;
            
            modal.classList.add('active');
        }
        
        function showDayMatches(dateStr, matches) {
            const modal = document.getElementById('modal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            
            title.textContent = `${dateStr} 赛程`;
            body.innerHTML = matches.map(match => `

        function kbGetMatch(id) {
            return matchData[id] || {
                id: id,
                home_team: '待定',
                away_team: '待定',
                home_score: null,
                away_score: null,
                home_penalty_score: null,
                away_penalty_score: null,
                match_date: '',
                match_time: '',
                venue: '',
                city: '',
                status: 'scheduled'
            };
        }
        
        function kbGetWinner(match) {
            if (!match || match.home_score === null || match.home_score === '' ||
                match.away_score === null || match.away_score === '') return null;
            const h = parseInt(match.home_score);
            const a = parseInt(match.away_score);
            if (isNaN(h) || isNaN(a)) return null;
            if (h > a) return 'home';
            if (a > h) return 'away';
            if (h === a && match.home_penalty_score !== null && match.away_penalty_score !== null) {
                const hp = parseInt(match.home_penalty_score);
                const ap = parseInt(match.away_penalty_score);
                if (!isNaN(hp) && !isNaN(ap)) {
                    if (hp > ap) return 'home';
                    if (ap > hp) return 'away';
                }
            }
            return null;
        }
        
        function kbApplyAdvancements() {
            Object.keys(KB_BRACKET_MAPPING).forEach(srcId => {
                const match = matchData[srcId];
                if (!match) return;
                const winner = kbGetWinner(match);
                if (!winner) return;
                const { to, slot } = KB_BRACKET_MAPPING[srcId];
                const teamName = winner === 'home' ? match.home_team : match.away_team;
                const target = kbGetMatch(to);
                if (slot === 'home') target.home_team = teamName;
                else target.away_team = teamName;
                matchData[to] = target;
            });
        }
        
        function kbCreateCard(matchId, extraClass = '', isVisible = true) {
            const match = kbGetMatch(matchId);
            const winner = kbGetWinner(match);
            const isScheduled = !match.home_score && !match.away_score;
            
            const homeWin = winner === 'home' ? 'winner' : (winner === 'away' ? 'loser' : '');
            const awayWin = winner === 'away' ? 'winner' : (winner === 'home' ? 'loser' : '');
            
            const homeIsPlaceholder = !match.home_team || match.home_team === '待定' || !isTeamDetermined(match.home_team);
            const awayIsPlaceholder = !match.away_team || match.away_team === '待定' || !isTeamDetermined(match.away_team);
            const isR16 = R16_PLACEHOLDERS[matchId];
            const homeName = homeIsPlaceholder 
                ? (isR16 ? getR16Placeholder(matchId, 'home') : '待定')
                : match.home_team;
            const awayName = awayIsPlaceholder 
                ? (isR16 ? getR16Placeholder(matchId, 'away') : '待定')
                : match.away_team;
            const homeScore = isScheduled ? '-' : (match.home_score ?? '-');
            const awayScore = isScheduled ? '-' : (match.away_score ?? '-');
            const hasPenalty = !isScheduled && match.home_penalty_score !== null && match.away_penalty_score !== null;
            const homeScoreDisplay = hasPenalty ? `${match.home_score}(${match.home_penalty_score})` : homeScore;
            const awayScoreDisplay = hasPenalty ? `${match.away_score}(${match.away_penalty_score})` : awayScore;
            
            const venueFlag = getVenueFlag(match.venue);
            const dateText = match.match_date ? match.match_date.slice(5) : '';
            const timeText = match.match_time || '';
            const cityText = match.city || match.venue || '';
            
            const matchNoMap = {
                'sf1': '半决赛①',
                'sf2': '半决赛②',
                'final': '决赛',
                'third': '三四名决赛'
            };
            const displayMatchNo = matchNoMap[matchId] || `${matchId}`;
            const visibilityStyle = isVisible ? '' : 'visibility: hidden; opacity: 0.3;';
            
            return `
                <div class="kb-card ${extraClass}" data-match-id="${matchId}" style="${visibilityStyle}" onclick="showKnockoutEditForm('${matchId}')">

                        <span class="match-num">${displayMatchNo}</span>

                        <span class="team-name ${homeIsPlaceholder ? 'tbd' : ''}">${homeName}</span>
                        <span class="team-score">${homeScoreDisplay}</span>
                    </div>
                    <div class="team ${awayWin}">
                        <span class="team-name ${awayIsPlaceholder ? 'tbd' : ''}">${awayName}</span>

        function kbRenderHalf(halfData, gridId, svgId, isUpper) {
            const grid = document.getElementById(gridId);
            const svg = document.getElementById(svgId);
            let html = '';
            
            // 上半场: 1/16→col1, 1/8→col2, 1/4→col3, sf→col4
            // 下半场: 1/16→col4, 1/8→col3, 1/4→col2, sf→col1
            const r16Col = isUpper ? 1 : 4;
            const r8Col = isUpper ? 2 : 3;

            // 绘制 SVG 连接线
            drawConnectors(halfData, grid, svg, isUpper);

        function drawConnectors(halfData, grid, svg, isUpper) {
            if (!svg) return;
            
            const cardW = 110;
            const colGap = 28;
            const rowH = 56;
            const padding = 10;
            
            const gridWidth = cardW * 4 + colGap * 3 + padding * 2;
            const gridHeight = 16 * rowH + padding * 2;
            
            svg.setAttribute('viewBox', `0 0 ${gridWidth} ${gridHeight}`);
            svg.setAttribute('preserveAspectRatio', 'none');
            
            let paths = '';
            
            // 列号映射 (上半场: 1/16→col1, 下半场: 1/16→col4)
            const r16Col = isUpper ? 1 : 4;
            const r8Col = isUpper ? 2 : 3;
            const r4Col = isUpper ? 3 : 2;
            const sfCol = isUpper ? 4 : 1;
            
            // 1/16决赛卡片位置
            const r16Pos = {};
            halfData.r16.forEach(m => {
                const top = padding + (m.row - 1) * rowH;
                const leftX = padding + (r16Col - 1) * (cardW + colGap);
                r16Pos[m.id] = {
                    leftX: leftX,
                    rightX: leftX + cardW,
                    centerY: top + rowH / 2
                };
            });
            
            // 1/8决赛卡片位置
            const r8Pos = {};
            halfData.r8.forEach(m => {
                const top = padding + (m.rows[0] - 1) * rowH;
                const bottom = padding + (m.rows[1] - 1) * rowH;
                const leftX = padding + (r8Col - 1) * (cardW + colGap);
                r8Pos[m.id] = {
                    leftX: leftX,
                    rightX: leftX + cardW,
                    centerY: (top + bottom) / 2
                };
            });
            
            // 1/4决赛卡片位置
            const r4Pos = {};
            halfData.r4.forEach(m => {
                const top = padding + (m.rows[0] - 1) * rowH;
                const bottom = padding + (m.rows[1] - 1) * rowH;
                const leftX = padding + (r4Col - 1) * (cardW + colGap);
                r4Pos[m.id] = {
                    leftX: leftX,
                    rightX: leftX + cardW,
                    centerY: (top + bottom) / 2
                };
            });
            
            // 半决赛卡片位置
            const sfPos = {};
            halfData.sf.forEach(m => {
                const top = padding + (m.rows[0] - 1) * rowH;
                const bottom = padding + (m.rows[1] - 1) * rowH;
                const leftX = padding + (sfCol - 1) * (cardW + colGap);
                sfPos[m.id] = {
                    leftX: leftX,
                    rightX: leftX + cardW,
                    centerY: (top + bottom) / 2
                };
            });
            
            // 找父母函数
            const findParent = (childId) => {
                return Object.keys(KB_BRACKET_MAPPING).filter(k => KB_BRACKET_MAPPING[k].to === childId);
            };
            
            // 绘制连接线 - 从子到父 (从右到左在上半场, 从左到右在下半场)
            const drawLine = (parent, child) => {
                let sourceX, targetX;
                if (isUpper) {
                    // 上半场: 父在左, 子在右
                    sourceX = parent.rightX;
                    targetX = child.leftX;
                } else {
                    // 下半场: 父在右, 子在左
                    sourceX = parent.leftX;
                    targetX = child.rightX;
                }
                const midX = (sourceX + targetX) / 2;
                const isWinner = kbGetWinner(matchData[Object.keys(r16Pos).find(k => r16Pos[k] === parent) ||
                                                          Object.keys(r8Pos).find(k => r8Pos[k] === parent) ||
                                                          Object.keys(r4Pos).find(k => r4Pos[k] === parent)]) !== null;
                let cls = 'connector-line';
                if (isWinner) cls += ' winner';
                
                const path = isUpper
                    ? `M ${sourceX} ${parent.centerY} L ${midX} ${parent.centerY} L ${midX} ${child.centerY} L ${targetX} ${child.centerY}`
                    : `M ${sourceX} ${parent.centerY} L ${midX} ${parent.centerY} L ${midX} ${child.centerY} L ${targetX} ${child.centerY}`;
                paths += `<path class="${cls}" d="${path}" />`;
            };
            
            const getPos = (id) => r16Pos[id] || r8Pos[id] || r4Pos[id];
            
            // r16 -> r8
            halfData.r8.forEach(m => {
                const parents = findParent(m.id);
                parents.forEach(parentId => {
                    const p = getPos(parentId);
                    const c = r8Pos[m.id];
                    if (p && c) drawLine(p, c);
                });
            });
            
            // r8 -> r4
            halfData.r4.forEach(m => {
                const parents = findParent(m.id);
                parents.forEach(parentId => {
                    const p = getPos(parentId);
                    const c = r4Pos[m.id];
                    if (p && c) drawLine(p, c);
                });
            });
            
            // r4 -> sf
            halfData.sf.forEach(m => {
                const parents = findParent(m.id);
                parents.forEach(parentId => {
                    const p = getPos(parentId);
                    const c = sfPos[m.id];
                    if (p && c) drawLine(p, c);
                });
            });
            
            svg.innerHTML = paths;
        }
        
        function drawCenterConnectors() {
            const wrapper = document.getElementById('bracketWrapper');
            const svg = document.getElementById('centerConnectors');
            if (!wrapper || !svg) return;
            
            const sf1Card = wrapper.querySelector('[data-match-id="sf1"]');
            const sf2Card = wrapper.querySelector('[data-match-id="sf2"]');
            const finalCard = wrapper.querySelector('[data-match-id="final"]');
            const thirdCard = wrapper.querySelector('[data-match-id="third"]');
            
            if (!sf1Card || !sf2Card || !finalCard || !thirdCard) return;
            
            const wrapperRect = wrapper.getBoundingClientRect();
            const getCenter = (el) => {
                const r = el.getBoundingClientRect();
                return {
                    left: r.left - wrapperRect.left,
                    right: r.right - wrapperRect.left,
                    centerY: r.top - wrapperRect.top + r.height / 2
                };
            };
            
            const sf1 = getCenter(sf1Card);
            const sf2 = getCenter(sf2Card);
            const finalC = getCenter(finalCard);
            const thirdC = getCenter(thirdCard);
            
            svg.setAttribute('viewBox', `0 0 ${wrapperRect.width} ${wrapperRect.height}`);
            svg.setAttribute('width', wrapperRect.width);
            svg.setAttribute('height', wrapperRect.height);
            
            const paths = [];
            
            const sf1Winner = kbGetWinner(kbGetMatch('sf1'));
            const sf2Winner = kbGetWinner(kbGetMatch('sf2'));
            
            // sf1 → final
            const midX1 = (sf1.right + finalC.left) / 2;
            const sf1FinalClass = sf1Winner ? 'connector-line winner' : 'connector-line tbd solid';
            paths.push(`<path class="${sf1FinalClass}" d="M ${sf1.right} ${sf1.centerY} L ${midX1} ${sf1.centerY} L ${midX1} ${finalC.centerY} L ${finalC.left} ${finalC.centerY}" />`);
            
            // sf2 → final
            const midX2 = (sf2.left + finalC.right) / 2;
            const sf2FinalClass = sf2Winner ? 'connector-line winner' : 'connector-line tbd solid';
            paths.push(`<path class="${sf2FinalClass}" d="M ${sf2.left} ${sf2.centerY} L ${midX2} ${sf2.centerY} L ${midX2} ${finalC.centerY} L ${finalC.right} ${finalC.centerY}" />`);
            
            // sf1 → third (虚线 灰色)
            const midX3 = (sf1.right + thirdC.left) / 2;
            paths.push(`<path class="connector-line tbd" d="M ${sf1.right} ${sf1.centerY} L ${midX3} ${sf1.centerY} L ${midX3} ${thirdC.centerY} L ${thirdC.left} ${thirdC.centerY}" />`);
            
            // sf2 → third (虚线 灰色)
            const midX4 = (sf2.left + thirdC.right) / 2;
            paths.push(`<path class="connector-line tbd" d="M ${sf2.left} ${sf2.centerY} L ${midX4} ${sf2.centerY} L ${midX4} ${thirdC.centerY} L ${thirdC.right} ${thirdC.centerY}" />`);
            
            svg.innerHTML = paths.join('');
        }
        
        function isGroupDetermined(group, matches, standingsData) {
            const groupMatches = matches.filter(m => m.group_name === group);
            const allPlayed = groupMatches.length > 0 && groupMatches.every(m => 
                m.home_score !== '' && m.home_score !== null && 
                m.away_score !== '' && m.away_score !== null
            );
            if (!allPlayed) return false;
            if (!standingsData || !standingsData[group]) return false;
            const gs = standingsData[group];
            return gs.length >= 1 && gs[0].is_determined === true;
        }
        
        function isMatchVisible(matchId, allMatches, determinedGroups) {
            const r16Dependencies = {
                '73': ['A', 'B'], '75': ['E'], '74': ['C', 'F'], '77': ['E', 'I'],
                '86': ['D', 'G'], '88': ['K', 'D'], '85': ['B'], '87': ['K', 'J'],
                '76': ['F', 'C'], '78': ['I'], '79': ['A'], '80': ['L'],
                '83': ['H', 'J'], '84': ['K', 'L'], '81': ['G'], '82': ['D', 'B']
            };
            
            if (r16Dependencies[matchId]) {
                return r16Dependencies[matchId].every(g => determinedGroups.has(g));
            }
            
            if (['89', '90', '91', '92', '93', '94', '95', '96'].includes(matchId)) {
                return true;
            }
            
            if (matchId === '97' || matchId === '100') return true;
            if (matchId === '99' || matchId === '98') return true;
            if (matchId === 'sf1' || matchId === 'sf2') return true;
            if (matchId === 'final' || matchId === 'third') return true;
            
            return true;
        }

async function predictMatch(matchId) {
            const btn = document.getElementById('aiPredictBtn');
            const resultDiv = document.getElementById('aiResult' + matchId);
            btn.disabled = true;
            btn.textContent = '分析中...';

            try {
                const response = await fetch(`${API_BASE}/predict-match/${matchId}`, { method: 'POST' });
                const data = await response.json();

                if (data.success) {
                    document.getElementById('aiScore' + matchId).textContent = '预测比分: ' + data.prediction;
                    document.getElementById('aiReason' + matchId).textContent = data.reason;
                    resultDiv.style.display = 'block';
                    btn.textContent = '查看AI预测';
                    btn.onclick = () => {
                        if (resultDiv.style.display === 'none') {
                            resultDiv.style.display = 'block';
                        } else {
                            resultDiv.style.display = 'none';
                        }
                    };
                } else {
                    showToast('预测失败: ' + (data.error || '未知错误'), true);
                    btn.textContent = '🤖 AI预测比分';
                    btn.disabled = false;
                }
            } catch (err) {
                showToast('预测请求失败: ' + err.message, true);
                btn.textContent = '🤖 AI预测比分';
                btn.disabled = false;
            }
        }

        async function loadExistingPrediction(matchId) {
            try {
                const response = await fetch(`${API_BASE}/get-prediction/${matchId}`);
                const data = await response.json();

                const btn = document.getElementById('aiPredictBtn');
                const resultDiv = document.getElementById('aiResult' + matchId);

                if (data.success) {
                    document.getElementById('aiScore' + matchId).textContent = '预测比分: ' + data.prediction;
                    document.getElementById('aiReason' + matchId).textContent = data.reason;
                    resultDiv.style.display = 'block';
                    btn.textContent = '查看AI预测';
                    btn.onclick = () => {
                        if (resultDiv.style.display === 'none') {
                            resultDiv.style.display = 'block';
                        } else {
                            resultDiv.style.display = 'none';
                        }
                    };
                    return true;
                }
            } catch (err) {
                console.log('No existing prediction');
            }
return false;
        }

        async function loadAllPredictions() {
            const container = document.getElementById('predictionsList');
            container.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-secondary);">加载中...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/all-predictions`);
                const data = await response.json();
                
                if (data.success && data.predictions && data.predictions.length > 0) {
                    container.innerHTML = data.predictions.map(p => `
                        <div class="prediction-card" style="background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                                <div style="font-size: 0.85rem; color: var(--text-secondary);">
                                    📅 ${p.match_date} ${p.match_time} | 🏟️ ${p.venue}
                                </div>
                                <div style="font-size: 0.8rem; color: var(--accent);">${p.stage}</div>
                            </div>
                            <div style="font-size: 1.3rem; font-weight: 700; text-align: center; margin-bottom: 12px;">
                                ${p.home_team} vs ${p.away_team}
                            </div>
                            <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 8px; padding: 12px; margin-bottom: 10px; text-align: center;">
                                <div style="font-size: 1.5rem; font-weight: bold;">🤖 AI预测: ${p.prediction}</div>
                            </div>
                            <div style="font-size: 0.9rem; color: var(--text-secondary); line-height: 1.5;">
                                ${p.reason}
                            </div>
                            ${p.home_score !== null && p.away_score !== null ? `
                                <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); text-align: center;">
                                    <span style="color: ${p.prediction === `${p.home_score}-${p.away_score}` ? '#4caf50' : '#f44336'};">
                                        实际比分: ${p.home_score} - ${p.away_score} | 
                                        ${p.prediction === `${p.home_score}-${p.away_score}` ? '✓ 预测正确' : '✗ 预测错误'}
                                    </span>
                                </div>
                            ` : ''}
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-secondary);">暂无预测记录<br>点击比赛编辑按钮可进行AI预测</div>';
                }
            } catch (err) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-secondary);">加载预测记录失败</div>';
            }
        }

        async function viewPrediction(matchId) {
            try {
                const response = await fetch(`${API_BASE}/get-prediction/${matchId}`);
                const data = await response.json();

                if (data.success) {
                    document.getElementById('aiScore' + matchId).textContent = '预测比分: ' + data.prediction;
                    document.getElementById('aiReason' + matchId).textContent = data.reason;
                    document.getElementById('aiResult' + matchId).style.display = 'block';
                } else {
                    showToast('暂无预测结果', true);
                }
            } catch (err) {
                showToast('获取预测失败', true);
            }
        }

        async function saveMatchResult(matchId) {
            const saveBtn = document.getElementById('editSaveBtn');
            if (saveBtn) saveBtn.disabled = true;
            
            const homeScore = document.getElementById('editHomeScore').value;
            const awayScore = document.getElementById('editAwayScore').value;
            const homeYellow = document.getElementById('editHomeYellow').value || 0;
            const homeRed = document.getElementById('editHomeRed').value || 0;
            const awayYellow = document.getElementById('editAwayYellow').value || 0;
            const awayRed = document.getElementById('editAwayRed').value || 0;
            const homePenaltyEl = document.getElementById('editHomePenalty');
            const awayPenaltyEl = document.getElementById('editAwayPenalty');
            const homePenalty = homePenaltyEl ? (homePenaltyEl.value !== '' ? parseInt(homePenaltyEl.value) : null) : null;
            const awayPenalty = awayPenaltyEl ? (awayPenaltyEl.value !== '' ? parseInt(awayPenaltyEl.value) : null) : null;
            
            try {
                const response = await fetch(`${API_BASE}/matches/${matchId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        home_score: homeScore,
                        away_score: awayScore,
                        home_yellow_card: parseInt(homeYellow),
                        home_red_card: parseInt(homeRed),
                        away_yellow_card: parseInt(awayYellow),
                        away_red_card: parseInt(awayRed),
                        home_penalty_score: homePenalty,
                        away_penalty_score: awayPenalty
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast('比赛结果已保存！');
                    closeModal();
                    await fetchMatches();
                    if (result.standings && result.standings.length > 0) {
                        updateStandingsForGroup(result.group_name, result.standings);
                    } else {
                        renderStandings();
                    }
                    fetch(`${API_BASE}/refresh-knockout`, { method: 'POST' })
                        .then(() => fetchMatches())
                        .then(() => fetchStandings())
                        .then(() => {
                            renderCalendar();
                            renderBrackets();
                        });
                } else {
                    showToast('保存失败：' + (result.error || '未知错误'), true);
                }
            } catch (error) {
                showToast('网络错误，请重试', true);
                console.error('保存比赛结果失败:', error);
            } finally {
                if (saveBtn) saveBtn.disabled = false;
            }
        }

        async function saveKnockoutResult(matchId) {
            const saveBtn = document.getElementById('editSaveBtn');
            if (saveBtn) saveBtn.disabled = true;
            
            const homeScore = document.getElementById('editHomeScore').value;
            const awayScore = document.getElementById('editAwayScore').value;
            const homePenalty = document.getElementById('editHomePenalty').value;
            const awayPenalty = document.getElementById('editAwayPenalty').value;
            
            try {
                const response = await fetch(`${API_BASE}/matches/${matchId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        home_score: homeScore,
                        away_score: awayScore,
                        home_penalty_score: homePenalty !== '' ? parseInt(homePenalty) : null,
                        away_penalty_score: awayPenalty !== '' ? parseInt(awayPenalty) : null
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast('比赛结果已保存！');
                    closeModal();
                    fetch(`${API_BASE}/refresh-knockout`, { method: 'POST' })
                        .then(() => fetchMatches())
                        .then(() => fetchStandings())
                        .then(() => {
                            renderBrackets();
                        });
                } else {
                    showToast('保存失败：' + (result.error || '未知错误'), true);
                }
            } catch (error) {
                showToast('网络错误，请重试', true);
                console.error('保存比赛结果失败:', error);
            } finally {
                if (saveBtn) saveBtn.disabled = false;
            }
        }
        
        function resetAllData() {
            if (!confirm('确定要重置所有比赛数据吗？比分和红黄牌记录都将清空。')) return;
            
            const btn = document.getElementById('resetDataBtn');
            btn.disabled = true;
            btn.textContent = '重置中...';
            
            fetch(`${API_BASE}/reset-test-data`, { method: 'POST' })
                .then(r => r.json())
                .then(d => {
                    if (d.success) {
                        showToast('数据已重置！');
                        fetchMatches().then(() => {
                            renderCalendar();
                            renderStandings();
                            renderBrackets();
                        });
                    } else {
                        showToast('重置失败', true);
                    }
                    btn.disabled = false;
                    btn.textContent = '🔄 重置数据';
                })
                .catch(err => {
                    showToast('重置失败: ' + err.message, true);
                    btn.disabled = false;
                    btn.textContent = '🔄 重置数据';
                });
        }

        function fillRound(roundNum) {
            const btn = document.getElementById(`fillRound${roundNum}Btn`);
            btn.disabled = true;
            btn.textContent = '填充中...';

            fetch(`${API_BASE}/fill-round/${roundNum}`, { method: 'POST' })
                .then(r => r.json())
                .then(d => {
                    if (d.success) {
                        showToast(d.message + ` (${d.updated_count}场)`);
                        fetchMatches().then(() => {
                            renderCalendar();
                            renderStandings();
                            renderBrackets();
                        });
                    } else {
                        showToast('填充失败', true);
                    }
                    btn.disabled = false;
                    btn.textContent = `📝 填第${roundNum}轮`;
                })
                .catch(err => {
                    showToast('填充失败: ' + err.message, true);
                    btn.disabled = false;
                    btn.textContent = `📝 填第${roundNum}轮`;
                });
        }

        function fillAllRounds() {
            const btn = document.getElementById('fillAllBtn');
            btn.disabled = true;
            btn.textContent = '填充中...';

            fetch(`${API_BASE}/fill-all-rounds`, { method: 'POST' })
                .then(r => r.json())
                .then(d => {
                    if (d.success) {
                        showToast(d.message + ` (${d.updated_count}场)`);
                        fetchMatches().then(() => {
                            renderCalendar();
                            renderStandings();
                            renderBrackets();
                        });
                    } else {
                        showToast('填充失败', true);
                    }
                    btn.disabled = false;
                    btn.textContent = '🎲 填全部';
                })
                .catch(err => {
                    showToast('填充失败: ' + err.message, true);
btn.disabled = false;
                    btn.textContent = '🔄 重置数据';
                });
        }

        function fillRound(roundNum) {
            fetch(`${API_BASE}/fill-round/${roundNum}`, { method: 'POST' })
                .then(r => r.json())
                .then(d => {
                    if (d.success) {
                        showToast(d.message);
                        fetchMatches().then(() => {
                            fetchStandings().then(() => {
                                renderCalendar();
                                renderStandings();
                            });
                        });
                    } else {
                        showToast('填充失败', true);
                    }
                })
                .catch(err => showToast('填充失败: ' + err.message, true));
        }

        function fillAllRounds() {
            fetch(`${API_BASE}/fill-all-rounds`, { method: 'POST' })
                .then(r => r.json())
                .then(d => {
                    if (d.success) {
                        showToast(d.message);
                        fetchMatches().then(() => {
                            fetchStandings().then(() => {
                                renderCalendar();
                                renderStandings();
                            });
                        });
                    } else {
                        showToast('填充失败', true);
                    }
                })
                .catch(err => showToast('填充失败: ' + err.message, true));
        }

        init();
    </script>
    <div class="fill-buttons" style="position: fixed; bottom: 70px; right: 20px; display: flex; gap: 8px; z-index: 100;">
        <button class="fill-btn" onclick="fillRound(1)">填第1轮</button>
        <button class="fill-btn" onclick="fillRound(2)">填第2轮</button>
        <button class="fill-btn" onclick="fillRound(3)">填第3轮</button>
        <button class="fill-btn fill-btn-all" onclick="fillAllRounds()">填全部</button>
    </div>
    <style>
        .fill-btn {
            padding: 8px 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .fill-btn:hover {
            background: #2563eb;
        }
        .fill-btn-all {
            background: #10b981;
        }
        .fill-btn-all:hover {
            background: #059669;
        }
    </style>
    <button class="reset-btn" id="resetDataBtn" onclick="resetAllData()">🔄 重置数据</button>
</body>
</html>
