<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>API Test</title>
</head>
<body>
    <h1>API 测试</h1>
    <button onclick="testAPI()">测试 API</button>
    <pre id="output"></pre>
    
    <script>
        async function testAPI() {
            const output = document.getElementById('output');
            try {
                const response = await fetch('http://localhost:5000/api/matches?year=2026');
                const data = await response.json();
                output.textContent = 'API 返回成功!\n';
                output.textContent += '比赛总数: ' + data.length + '\n\n';
                if (data.length > 0) {
                    output.textContent += '第一场比赛:\n' + JSON.stringify(data[0], null, 2);
                }
            } catch (error) {
                output.textContent = 'API 调用失败:\n' + error.message;
            }
        }
        
        testAPI();
    </script>
</body>
</html>
